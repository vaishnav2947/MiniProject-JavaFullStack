# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/issue_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Vivek29478714
